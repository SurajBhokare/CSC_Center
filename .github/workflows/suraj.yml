name: Suraj workflow
on: 
  push:
jobs: 
      build: # job's name
        runs-on: ubuntu-latest # github runner(free)
        steps:
          - uses: actions/checkout@v4 # clone the code on ubuntu runner
          - name: Set up Node.js
            uses: actions/setup-node@v3
            with:
              node-version: '18'
          - name: Install dependencies
            run: npm install
          - name: Run tests
            run: npm test